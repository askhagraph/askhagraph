[package]
name = "askhagraph-native"
version = "0.1.0"
edition = "2021"
description = "Native tree-sitter parser and symbol indexer for AskhaGraph"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", default-features = false, features = ["napi9"] }
napi-derive = "3"
tree-sitter = "0.24"
tree-sitter-typescript = "0.23"
tree-sitter-javascript = "0.23"
tree-sitter-java = "0.23"
tree-sitter-rust = "0.23"
tree-sitter-python = "0.23"
tree-sitter-go = "0.23"
tree-sitter-c-sharp = "0.23"
rayon = "1.10"
sha2 = "0.10"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = "symbols"
