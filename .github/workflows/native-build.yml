name: Build Native Addon

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}
    name: Build - ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install dependencies
        working-directory: packages/native
        run: npm install

      - name: Install napi CLI
        run: npm install -g @napi-rs/cli

      - name: Build native addon
        working-directory: packages/native
        run: napi build --platform --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: bindings-${{ matrix.target }}
          path: packages/native/*.node
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    name: Publish npm packages
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (trusted publishing requires npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: packages/native/artifacts

      - name: Install napi CLI
        run: npm install -g @napi-rs/cli

      - name: Move artifacts to platform packages
        working-directory: packages/native
        run: |
          napi artifacts --build-output-dir artifacts --npm-dir npm

      - name: Install dependencies
        working-directory: packages/native
        run: npm install

      - name: Publish platform packages
        working-directory: packages/native
        run: |
          for dir in npm/*/; do
            if [ -d "$dir" ]; then
              echo "Publishing $dir..."
              cd "$dir"
              npm publish --access public --provenance || echo "Skipping $dir (may already exist)"
              cd ../..
            fi
          done

      - name: Publish @askhagraph/native
        working-directory: packages/native
        run: npm publish --access public --provenance

      - name: Build @askhagraph/core-engine
        run: npm run build --workspace=packages/core-engine

      - name: Publish @askhagraph/core-engine
        working-directory: packages/core-engine
        run: npm publish --access public --provenance

      - name: Build @askhagraph/cli
        run: npm run build --workspace=packages/cli

      - name: Publish @askhagraph/cli
        working-directory: packages/cli
        run: npm publish --access public --provenance
